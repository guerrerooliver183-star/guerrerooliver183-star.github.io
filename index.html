<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Number! Neon Edition</title>

  <meta name="description" content="Juego Adivina el Número Neon - estilo futurista, gratuito y online.">
  <meta name="keywords" content="juego, adivina el número, neon, online game">
  <meta name="google-adsense-account" content="ca-pub-1507185555135622">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="PWA/icon-512.png" type="image/png">
  <meta name="theme-color" content="#0d0d0d">

  <style>
    :root {
      --neon-blue: #00f0ff;
      --neon-pink: #ff00ff;
      --neon-green: #39ff14;
      --neon-red: #ff073a;
      --disabled-gray: #444;
    }

    body {
      margin: 0;
      background: #050505;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      color: var(--neon-blue);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 { 
      font-size: 3.5em; 
      color: var(--neon-blue); 
      text-shadow: 0 0 5px var(--neon-blue), 0 0 20px var(--neon-blue);
      margin: 20px 0;
      animation: flicker 2s infinite alternate, glowPulse 3s infinite alternate;
    }

    @keyframes glowPulse {
      from { text-shadow: 0 0 5px var(--neon-blue), 0 0 10px var(--neon-blue); }
      to { text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-pink); }
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.7; }
    }

    .game-container {
      position: relative;
      padding: 40px;
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 20px;
      z-index: 1;
      overflow: hidden;
    }

    .game-container::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: conic-gradient(transparent, var(--neon-blue), var(--neon-pink), transparent 30%);
      animation: rotateBorder 4s linear infinite;
      z-index: -2;
    }

    .game-container::after {
      content: '';
      position: absolute;
      inset: 4px;
      background: #050505;
      border-radius: 16px;
      z-index: -1;
    }

    @keyframes rotateBorder {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    input {
      padding: 15px;
      font-size: 20px;
      background: transparent;
      color: var(--neon-blue);
      border: 2px solid var(--neon-blue);
      border-radius: 5px;
      text-align: center;
      outline: none;
      box-shadow: 0 0 10px var(--neon-blue);
      transition: 0.5s;
    }

    input:focus {
      box-shadow: 0 0 25px var(--neon-pink);
      border-color: var(--neon-pink);
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      background: transparent;
      color: var(--neon-blue);
      border: 2px solid var(--neon-blue);
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Orbitron';
      font-weight: bold;
      text-transform: uppercase;
      box-shadow: 0 0 15px var(--neon-blue);
      transition: 0.3s;
    }

    button:hover:not(:disabled) {
      background: var(--neon-blue);
      color: #000;
      box-shadow: 0 0 40px var(--neon-blue);
      transform: scale(1.05);
    }

    button:disabled {
      color: var(--disabled-gray);
      border-color: var(--disabled-gray);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* SPINNER AJUSTADO A LA IZQUIERDA */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0, 240, 255, 0.3);
      border-radius: 50%;
      border-top-color: var(--neon-blue);
      animation: spin 1s ease-in-out infinite;
      margin-right: 10px; /* Margen a la derecha para separar del texto */
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .arrow {
      font-size: 1.2em;
      vertical-align: middle;
      display: inline-block;
      margin-left: 8px;
    }
    .arrow-up { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
    .arrow-down { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

    #resultado { font-size: 24px; min-height: 40px; margin-top: 15px; line-height: 1.5; }
    #alerta { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); min-height: 25px; }

    .bg-animation {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
      z-index: -3;
    }

    footer { margin-top: auto; padding: 20px; opacity: 0.7; font-size: 0.8em; }
    #legalFooter button { background: none; border: 1px solid #333; font-size: 10px; cursor: pointer; color: #555; margin: 0 5px; box-shadow: none; }
  </style>
</head>
<body>

<div class="bg-animation"></div>

<h1 id="titulo"></h1>
<p id="instrucciones"></p>

<div class="game-container">
  <input type="number" id="numero" min="1" max="100">
  <button id="adivinarBtn"></button>
  
  <p id="resultado"></p>
  <p id="alerta"></p>
  <p id="intentos"></p>
  <p id="acertados" style="color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green);"></p>
</div>

<br>
<button id="toggleHistorial" style="border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink);"></button>

<div id="historial" style="display:none; text-align: left; padding: 20px; border: 1px solid var(--neon-pink); margin-top: 20px; background: rgba(0,0,0,0.8); width: 80%; max-width: 400px; border-radius: 10px;">
  <h2 id="historialTitulo" style="color: var(--neon-pink); font-size: 18px; text-align: center;"></h2>
  <ul id="historialLista" style="padding: 0;"></ul>
</div>

<footer id="footer"></footer>

<div id="legalFooter">
  <button id="btnTerms"></button>
  <button id="btnPrivacy"></button>
  <button id="btnCookies"></button>
</div>

<script>
const userLang = navigator.language || navigator.userLanguage;
const lang = userLang.startsWith('es') ? 'es' : 'en';

const mensajes = {
  es: {
    titulo:"NEON GUESSER",
    instrucciones:"SISTEMA OPERATIVO: Adivina el número (1-100)",
    adivinar:"VERIFICAR",
    correcto:"ACCESO CONCEDIDO",
    bajo: "ERROR: Valor BAJO <span class='arrow arrow-down'>▼</span>",
    alto: "ERROR: Valor ALTO <span class='arrow arrow-up'>▲</span>",
    limite:"⚠ RANGO INVÁLIDO",
    intentos:"INTENTOS",
    acertados:"RECORDS",
    historialBtn:"LOGS DEL SISTEMA",
    historialTitulo:"DATOS DE SESIÓN",
    placeholder:"00",
    footer:"© 2026 // Oliver Guerrero & ChatGPT",
    generando:"REINICIANDO EN"
  },
  en: {
    titulo:"NEON GUESSER",
    instrucciones:"OS: Guess the number (1-100)",
    adivinar:"VERIFY",
    correcto:"ACCESS GRANTED",
    bajo: "ERROR: Too LOW <span class='arrow arrow-down'>▼</span>",
    alto: "ERROR: Too HIGH <span class='arrow arrow-up'>▲</span>",
    limite:"⚠ INVALID RANGE",
    intentos:"ATTEMPTS",
    acertados:"RECORDS",
    historialBtn:"SYSTEM LOGS",
    historialTitulo:"SESSION DATA",
    placeholder:"00",
    footer:"© 2026 // Oliver Guerrero & ChatGPT",
    generando:"REBOOTING IN"
  }
};

const btn = document.getElementById('adivinarBtn');
const input = document.getElementById('numero');
const resultado = document.getElementById('resultado');
const alerta = document.getElementById('alerta');
const intentosTexto = document.getElementById('intentos');
const acertadosTexto = document.getElementById('acertados');
const historialDiv = document.getElementById('historial');
const historialLista = document.getElementById('historialLista');
const toggleHistorial = document.getElementById('toggleHistorial');

let numeroSecreto = Math.floor(Math.random() * 100) + 1;
let intentos = 0;
let acertados = 0;
let contadorInterval;

function procesarIntento() {
  if(btn.disabled) return;
  const guess = Number(input.value);
  if(!guess || guess < 1 || guess > 100) {
    alerta.textContent = mensajes[lang].limite;
    return;
  }
  alerta.textContent = '';
  intentos++;
  intentosTexto.textContent = `${mensajes[lang].intentos}: ${intentos}`;

  if(guess === numeroSecreto) {
    acertados++;
    acertadosTexto.textContent = `${mensajes[lang].acertados}: ${acertados}`;
    
    // Muestra Acceso Concedido
    resultado.innerHTML = `<span style="color: var(--neon-green);">${mensajes[lang].correcto}</span>`;
    btn.disabled = true;
    guardarHistorial();

    let tiempo = 5;
    if(contadorInterval) clearInterval(contadorInterval);
    
    // Función para actualizar el texto manteniendo "Acceso Concedido"
    const actualizarCuenta = () => {
      resultado.innerHTML = `
        <span style="color: var(--neon-green);">${mensajes[lang].correcto}</span><br>
        <div class="spinner"></div> ${mensajes[lang].generando} ${tiempo}...
      `;
    };

    actualizarCuenta();

    contadorInterval = setInterval(() => {
      tiempo--;
      if(tiempo >= 0){
        actualizarCuenta();
      } else {
        clearInterval(contadorInterval);
        numeroSecreto = Math.floor(Math.random() * 100) + 1;
        resultado.innerHTML = '';
        intentos = 0;
        intentosTexto.textContent = `${mensajes[lang].intentos}: 0`;
        btn.disabled = false;
      }
    }, 1000);
  } else {
    resultado.innerHTML = guess < numeroSecreto ? mensajes[lang].bajo : mensajes[lang].alto;
  }
  input.value = '';
  input.focus();
}

btn.onclick = procesarIntento;
input.addEventListener("keypress", (e) => { if (e.key === "Enter") procesarIntento(); });

function actualizarIdioma() {
  document.getElementById('titulo').textContent = mensajes[lang].titulo;
  document.getElementById('instrucciones').textContent = mensajes[lang].instrucciones;
  document.getElementById('adivinarBtn').textContent = mensajes[lang].adivinar;
  document.getElementById('numero').placeholder = mensajes[lang].placeholder;
  document.getElementById('intentos').textContent = mensajes[lang].intentos + ": 0";
  document.getElementById('acertados').textContent = mensajes[lang].acertados + ": 0";
  document.getElementById('toggleHistorial').textContent = mensajes[lang].historialBtn;
  document.getElementById('historialTitulo').textContent = mensajes[lang].historialTitulo;
  document.getElementById('footer').textContent = mensajes[lang].footer;
  document.getElementById('btnTerms').textContent = lang==='es' ? "Términos" : "Terms";
  document.getElementById('btnPrivacy').textContent = lang==='es' ? "Privacidad" : "Privacy";
  document.getElementById('btnCookies').textContent = "Cookies";
}

function guardarHistorial() {
  const historial = JSON.parse(localStorage.getItem('historial')) || [];
  const fecha = new Date().toLocaleTimeString();
  historial.push({fecha,intentos,acertados});
  localStorage.setItem('historial',JSON.stringify(historial));
  cargarHistorial();
}

function cargarHistorial() {
  historialLista.innerHTML = '';
  const historial = JSON.parse(localStorage.getItem('historial')) || [];
  historial.slice(-5).reverse().forEach(item => {
    const li = document.createElement('li');
    li.style.color = "var(--neon-blue)";
    li.style.listStyle = "none";
    li.style.fontSize = "14px";
    li.style.marginBottom = "5px";
    li.textContent = `> [${item.fecha}] INTENTOS: ${item.intentos}`;
    historialLista.appendChild(li);
  });
}

toggleHistorial.onclick = () => {
  historialDiv.style.display = (historialDiv.style.display==='none'||historialDiv.style.display==='') ? 'block' : 'none';
};

document.getElementById('btnTerms').onclick = () => window.location.href = 'terms.html';
document.getElementById('btnPrivacy').onclick = () => window.location.href = 'privacy.html';
document.getElementById('btnCookies').onclick = () => window.location.href = 'cookies.html';

actualizarIdioma();
cargarHistorial();
</script>
</body>
</html>
