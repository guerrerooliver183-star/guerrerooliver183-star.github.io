<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookies - Neon Guesser</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00f0ff;
      --neon-pink: #ff00ff;
    }

    body {
      margin: 0;
      background: #050505;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      color: var(--neon-blue);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 { 
      font-size: 2.5em; 
      color: var(--neon-blue); 
      text-shadow: 0 0 5px var(--neon-blue), 0 0 20px var(--neon-blue);
      margin-bottom: 20px;
      animation: flicker 2s infinite alternate;
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.7; }
    }

    .policy-container {
      position: relative;
      padding: 30px;
      max-width: 600px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 20px;
      overflow: hidden;
      margin: 20px;
      z-index: 1;
    }

    /* El borde animado que une todo el diseño del sitio */
    .policy-container::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: conic-gradient(transparent, var(--neon-blue), var(--neon-pink), transparent 30%);
      animation: rotateBorder 4s linear infinite;
      z-index: -2;
    }

    .policy-container::after {
      content: '';
      position: absolute;
      inset: 4px;
      background: #050505;
      border-radius: 16px;
      z-index: -1;
    }

    @keyframes rotateBorder {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    p {
      font-size: 1.1em;
      line-height: 1.6;
      color: #fff;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
      margin-bottom: 30px;
    }

    button {
      padding: 15px 35px;
      font-size: 18px;
      background: transparent;
      color: var(--neon-blue);
      border: 2px solid var(--neon-blue);
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Orbitron';
      font-weight: bold;
      text-transform: uppercase;
      box-shadow: 0 0 15px var(--neon-blue);
      transition: 0.3s;
    }

    button:hover {
      background: var(--neon-blue);
      color: #000;
      box-shadow: 0 0 40px var(--neon-blue);
      transform: scale(1.05);
    }

    .bg-animation {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
      z-index: -3;
    }
  </style>
</head>
<body>

<div class="bg-animation"></div>

<div class="policy-container">
  <h1 id="titulo"></h1>
  <p id="texto"></p>
  <button id="aceptarBtn"></button>
</div>

<script>
const mensajes = {
  es: {
    titulo: "Uso de Cookies",
    texto: `Este sitio utiliza tecnologías de almacenamiento local para guardar tus récords y logs del sistema. 
    Esta información se almacena solo en tu navegador para mejorar tu experiencia y no se comparte con terceros.`,
    aceptar: "ENTENDIDO"
  },
  en: {
    titulo: "Cookie Notice",
    texto: `This site uses local storage technologies to save your records and system logs. 
    This information is stored only in your browser to improve your experience and is not shared with third parties.`,
    aceptar: "UNDERSTOOD"
  }
};

const idioma = navigator.language.startsWith('es') ? 'es' : 'en';
document.getElementById('titulo').textContent = mensajes[idioma].titulo;
document.getElementById('texto').textContent = mensajes[idioma].texto;
document.getElementById('aceptarBtn').textContent = mensajes[idioma].aceptar;

document.getElementById('aceptarBtn').onclick = () => { window.location.href = "index.html"; };
</script>

</body>
</html>
